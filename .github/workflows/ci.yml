name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust-tests:
    name: Rust tests (${{ matrix.rust-toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust-toolchain: [stable]

    defaults:
      run:
        working-directory: soroban/contracts/veritas-verifier

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust ${{ matrix.rust-toolchain }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            soroban/contracts/veritas-verifier/target
          key: ${{ runner.os }}-cargo-${{ matrix.rust-toolchain }}-${{ hashFiles('soroban/contracts/veritas-verifier/Cargo.lock', 'soroban/contracts/veritas-verifier/Cargo.toml') }}

      - name: Run cargo tests
        run: cargo test

  js-deps:
    name: JS dependencies install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm install
